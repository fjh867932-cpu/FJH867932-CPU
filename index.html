<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>huiwu.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav id="navbar" class="navbar">
    <button id="nav-back" class="nav-back" title="返回">←</button>
    <span id="nav-title" class="nav-title">huiwu.com</span>
    <span class="nav-spacer"></span>
  </nav>

  <!-- 视图容器 -->
  <main id="view" class="view"></main>

  <!-- 便签墙模板 -->
  <template id="tpl-wall">
    <div class="wall">
      <div class="wall-bg"></div>
      <div class="notes-layer"></div>
      <div class="create-hint">✨ 点击此处贴一张便签</div>
      <div class="toolbar">
        <label class="tool-btn" title="更换背景图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>背景</span>
          <input type="file" class="bg-input" accept="image/*" hidden>
        </label>
        <span class="tool-divider"></span>
        <span class="tool-note-count">0 张便签</span>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
